<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Open Side-Bet Tracker - Shinnecock Hills</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM Production CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone (Stable Release) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js" crossorigin></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            golf: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
              950: '#052e16',
            },
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'flash-green': 'flashGreen 1.5s ease-out',
            'flash-red': 'flashRed 1.5s ease-out',
          },
          keyframes: {
            flashGreen: {
              '0%': { backgroundColor: 'rgba(34, 197, 94, 0.3)' },
              '100%': { backgroundColor: 'transparent' },
            },
            flashRed: {
              '0%': { backgroundColor: 'rgba(239, 68, 68, 0.3)' },
              '100%': { backgroundColor: 'transparent' },
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    // SVG Icon Helpers
    const CrownIcon = ({ className = "w-6 h-6" }) => (
      <svg className={className} fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 22h20v-2H2v2zm1-3l2-12 5 4 4-8 4 8 5-4 2 12H3z"/>
      </svg>
    );

    const FlagIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M3 21v-18m0 0h10.5c.6 0 1.2.3 1.5.8l1.4 2.4c.3.5.9.8 1.5.8H21v9h-8.1c-.6 0-1.2-.3-1.5-.8l-1.4-2.4c-.3-.5-.9-.8-1.5-.8H3z" />
      </svg>
    );

    const SettingsIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const LogsIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );

    const EditIcon = ({ className = "w-4 h-4" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    );

    function App() {
      const [geoffTeam, setGeoffTeam] = useState([
        { id: 'g1', name: "Cameron Young", score: 2, thru: "R1: 72", today: 0, flash: "" },
        { id: 'g2', name: "Tyrrell Hatton", score: 4, thru: "R1: 74", today: 0, flash: "" },
        { id: 'g3', name: "Matt Fitzpatrick", score: -3, thru: "8", today: 0, flash: "" },
        { id: 'g4', name: "Wyndham Clark", score: -6, thru: "7", today: 0, flash: "" },
        { id: 'g5', name: "Russell Henley", score: 2, thru: "8", today: 2, flash: "" }
      ]);

      const [joshTeam, setJoshTeam] = useState([
        { id: 'jo1', name: "Rory McIlroy", score: -1, thru: "R1: 69", today: 0, flash: "" },
        { id: 'jo2', name: "Tommy Fleetwood", score: 0, thru: "R1: 70", today: 0, flash: "" },
        { id: 'jo3', name: "Scottie Scheffler", score: 2, thru: "R1: 72", today: 0, flash: "" },
        { id: 'jo4', name: "Xander Schauffele", score: -1, thru: "7", today: -2, flash: "" },
        { id: 'jo5', name: "Jon Rahm", score: -2, thru: "5", today: 0, flash: "" }
      ]);

      // State Configs
      const [apiKey, setApiKey] = useState("");
      const [isSimulating, setIsSimulating] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isEditingScores, setIsEditingScores] = useState(false);
      
      // Temporary staging states for bulk edits
      const [editGeoff, setEditGeoff] = useState([]);
      const [editJosh, setEditJosh] = useState([]);

      const [logs, setLogs] = useState([
        { time: "10:15 AM", text: "⛳️ Shinnecock Hills morning updates parsed. Live leader Wyndham Clark sits at -6!" },
        { time: "10:17 AM", text: "🏆 Real-time head-to-head metrics compiled for Geoff vs. Josh." }
      ]);

      const geoffTotal = geoffTeam.reduce((sum, p) => sum + p.score, 0);
      const joshTotal = joshTeam.reduce((sum, p) => sum + p.score, 0);

      // Determine Bet 1 Leadership
      let bet1Leader = "TIED";
      let bet1Margin = 0;
      if (geoffTotal < joshTotal) {
        bet1Leader = "Geoff";
        bet1Margin = joshTotal - geoffTotal;
      } else if (joshTotal < geoffTotal) {
        bet1Leader = "Josh";
        bet1Margin = geoffTotal - joshTotal;
      }

      // Determine Bet 2 Alpha (Lowest single player)
      const allPlayers = [
        ...geoffTeam.map(p => ({ ...p, team: 'Geoff' })),
        ...joshTeam.map(p => ({ ...p, team: 'Josh' }))
      ];
      
      const alphaPlayer = allPlayers.reduce((best, current) => {
        return current.score < best.score ? current : best;
      }, allPlayers[0]);

      // Open Bulk Edit staging state
      const openBulkEdit = () => {
        setEditGeoff(geoffTeam.map(p => ({ ...p })));
        setEditJosh(joshTeam.map(p => ({ ...p })));
        setIsEditingScores(true);
      };

      // Save Bulk Score updates
      const saveBulkScores = () => {
        setGeoffTeam(editGeoff);
        setJoshTeam(editJosh);
        setIsEditingScores(false);
        
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        setLogs(prev => [
          { time: timestamp, text: "📝 Live scorecard overridden! Calculations updated." },
          ...prev
        ]);
      };

      // Manual individual modifier logic
      const handleScoreChange = (team, id, delta) => {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const updateTeam = (prevList) =>
          prevList.map(p => {
            if (p.id === id) {
              const newScore = p.score + delta;
              const flashType = delta < 0 ? 'flash-green' : 'flash-red';
              const logMsg = `⚡️ ${p.name} (${team}) score updated to ${newScore > 0 ? '+' : ''}${newScore === 0 ? 'E' : newScore}.`;
              
              setLogs(prev => [{ time: timestamp, text: logMsg }, ...prev]);
              return { ...p, score: newScore, flash: flashType };
            }
            return p;
          });

        if (team === 'Geoff') {
          setGeoffTeam(updateTeam);
        } else {
          setJoshTeam(updateTeam);
        }

        // Reset flashing animation states
        setTimeout(() => {
          setGeoffTeam(prev => prev.map(p => p.id === id ? { ...p, flash: '' } : p));
          setJoshTeam(prev => prev.map(p => p.id === id ? { ...p, flash: '' } : p));
        }, 1500);
      };

      useEffect(() => {
        let interval;
        if (isSimulating) {
          interval = setInterval(() => {
            const allT = ['Geoff', 'Josh'];
            const randomTeam = allT[Math.floor(Math.random() * allT.length)];
            const targetList = randomTeam === 'Geoff' ? geoffTeam : joshTeam;
            const randomPlayer = targetList[Math.floor(Math.random() * targetList.length)];
            
            const actionSeed = Math.random();
            if (actionSeed < 0.35) {
              // Birdie!
              handleScoreChange(randomTeam, randomPlayer.id, -1);
            } else if (actionSeed < 0.65) {
              // Bogey!
              handleScoreChange(randomTeam, randomPlayer.id, 1);
            } else {
              // Hole progression
              const thruNum = parseInt(randomPlayer.thru);
              if (!isNaN(thruNum) && thruNum < 18) {
                const nextThru = String(thruNum + 1);
                const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                setLogs(prev => [{ time: timestamp, text: `🏌️‍♂️ ${randomPlayer.name} has played through hole ${nextThru}.` }, ...prev]);
                
                const updateThru = (list) => list.map(p => p.id === randomPlayer.id ? { ...p, thru: nextThru } : p);
                if (randomTeam === 'Geoff') {
                  setGeoffTeam(updateThru);
                } else {
                  setJoshTeam(updateThru);
                }
              }
            }
          }, 8000);
        }
        return () => clearInterval(interval);
      }, [isSimulating, geoffTeam, joshTeam]);

      // Mock Fetch for API simulation with current 2026 data base
      const triggerFetchMock = () => {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        setLogs(prev => [
          { time: timestamp, text: "🔄 Querying live golf metrics..." },
          { time: timestamp, text: "✅ RapidAPI poll succeeded. Scores synced to active Shinnecock Hills database!" },
          ...prev
        ]);
      };

      return (
        <div className="max-w-7xl mx-auto px-4 py-6 md:py-10">
          
          {}
          <header className="flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-800 border-l-4 border-golf-600 rounded-lg p-6 mb-8 shadow-xl">
            <div>
              <div className="flex items-center space-x-2 text-golf-400 text-xs font-semibold uppercase tracking-wider mb-1">
                <span className="bg-red-600 h-2 w-2 rounded-full animate-ping"></span>
                <span className="text-red-500 font-bold">Live Round 2 Updates</span>
                <span className="text-gray-500">|</span>
                <span>Shinnecock Hills Golf Club (Par 70)</span>
              </div>
              <h1 className="text-3xl font-extrabold tracking-tight text-white flex items-center gap-2">
                U.S. Open H2H Pool Tracker
              </h1>
              <p className="text-gray-400 text-sm mt-1">
                Geoff vs. Josh side-bet engine monitoring the active Major Championship
              </p>
            </div>

            <div className="flex flex-wrap gap-2 mt-4 md:mt-0">
              <button
                onClick={() => { setActiveTab('dashboard'); setIsEditingScores(false); }}
                className={`px-4 py-2 rounded-md font-medium text-sm transition-all duration-150 flex items-center gap-2 ${activeTab === 'dashboard' && !isEditingScores ? 'bg-golf-600 text-white shadow-md' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
              >
                📊 Dashboard
              </button>
              <button
                onClick={() => { setActiveTab('logs'); setIsEditingScores(false); }}
                className={`px-4 py-2 rounded-md font-medium text-sm transition-all duration-150 flex items-center gap-2 ${activeTab === 'logs' ? 'bg-golf-600 text-white shadow-md' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
              >
                <LogsIcon className="w-4 h-4" />
                Live Feed Console ({logs.length})
              </button>
              <button
                onClick={() => { setActiveTab('api_config'); setIsEditingScores(false); }}
                className={`px-4 py-2 rounded-md font-medium text-sm transition-all duration-150 flex items-center gap-2 ${activeTab === 'api_config' ? 'bg-golf-600 text-white shadow-md' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
              >
                <SettingsIcon className="w-4 h-4" />
                API Setup
              </button>
            </div>
          </header>

          {/* Quick Simulation Bar */}
          <section className="bg-gray-800 border border-gray-700 rounded-lg px-6 py-4 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div className="flex items-center space-x-3">
              <span className="flex h-3 w-3 relative">
                <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isSimulating ? 'bg-green-400' : 'bg-yellow-400'}`}></span>
                <span className={`relative inline-flex rounded-full h-3 w-3 ${isSimulating ? 'bg-green-500' : 'bg-yellow-500'}`}></span>
              </span>
              <p className="text-sm font-medium">
                Status: <span className="text-white font-bold">{isSimulating ? "Simulation Streaming" : "Real Scores Synced"}</span>
              </p>
            </div>

            <div className="flex flex-wrap gap-3">
              <button
                onClick={openBulkEdit}
                className="px-4 py-1.5 rounded bg-amber-600 hover:bg-amber-700 text-white text-xs font-semibold tracking-wider uppercase transition-colors duration-150 flex items-center gap-1.5"
              >
                <EditIcon className="w-3.5 h-3.5" />
                Bulk Edit Standings
              </button>
              <button
                onClick={() => setIsSimulating(!isSimulating)}
                className={`px-4 py-1.5 rounded text-xs font-semibold tracking-wider uppercase transition-colors duration-150 ${isSimulating ? 'bg-red-600 hover:bg-red-700 text-white' : 'bg-golf-600 hover:bg-golf-700 text-white'}`}
              >
                {isSimulating ? "Stop Simulation" : "Simulate Live Movements"}
              </button>
              <button
                onClick={triggerFetchMock}
                className="px-4 py-1.5 rounded bg-gray-750 hover:bg-gray-700 text-white text-xs font-semibold tracking-wider uppercase transition-colors"
              >
                Force Poll Now 🔄
              </button>
            </div>
          </section>

          {}
          {activeTab === 'dashboard' && !isEditingScores && (
            <>
              {/* SIDE BET MONITOR TILES */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                
                {/* BET 1: COMBINED TEAM SCORE */}
                <div className="bg-gradient-to-br from-gray-800 to-gray-850 border border-gray-700 rounded-xl p-6 shadow-lg relative overflow-hidden">
                  <div className="absolute right-0 top-0 mt-2 mr-3 opacity-10">
                    <FlagIcon className="w-24 h-24 text-golf-400" />
                  </div>
                  
                  <div className="flex justify-between items-start mb-4">
                    <span className="bg-golf-950 text-golf-400 text-xs font-bold px-3 py-1 rounded-full border border-golf-800">
                      BET 1: Aggregate Team Match ($10)
                    </span>
                    <span className="text-gray-400 text-xs font-semibold">Net Combined Scores</span>
                  </div>

                  <h3 className="text-lg font-bold text-gray-200 mb-1">Lowest Combined Roster</h3>
                  
                  <div className="flex items-center justify-between my-5">
                    <div>
                      <p className="text-xs text-gray-400 uppercase font-medium">Geoff's Team Total</p>
                      <p className={`text-4xl font-extrabold ${geoffTotal <= 0 ? 'text-green-400' : 'text-red-400'}`}>
                        {geoffTotal > 0 ? `+${geoffTotal}` : geoffTotal === 0 ? 'E' : geoffTotal}
                      </p>
                    </div>

                    <div className="flex flex-col items-center">
                      <span className="text-xs font-extrabold text-golf-400 bg-golf-950 px-3 py-1 rounded-md border border-golf-800">
                        {bet1Leader === 'TIED' ? "TIED" : `${bet1Leader.toUpperCase()} LEADS`}
                      </span>
                      <span className="text-2xl font-black text-white mt-1">
                        {bet1Leader === 'TIED' ? "EVEN" : `${bet1Margin > 0 ? '-' : ''}${bet1Margin}`}
                      </span>
                      <span className="text-[10px] text-gray-500 uppercase mt-0.5">stroke margin</span>
                    </div>

                    <div className="text-right">
                      <p className="text-xs text-gray-400 uppercase font-medium">Josh's Team Total</p>
                      <p className={`text-4xl font-extrabold ${joshTotal <= 0 ? 'text-green-400' : 'text-red-400'}`}>
                        {joshTotal > 0 ? `+${joshTotal}` : joshTotal === 0 ? 'E' : joshTotal}
                      </p>
                    </div>
                  </div>

                  {/* Visual Progress Bar to show balance of power */}
                  <div className="w-full bg-gray-750 rounded-full h-3.5 overflow-hidden flex">
                    <div 
                      style={{ width: `${Math.max(15, Math.min(85, (joshTotal / (geoffTotal + joshTotal || 1)) * 100))}%` }} 
                      className="bg-golf-600 transition-all duration-500 ease-out"
                    ></div>
                    <div className="w-1 bg-yellow-500"></div>
                    <div className="flex-1 bg-blue-600 transition-all duration-500 ease-out"></div>
                  </div>
                  <div className="flex justify-between text-[10px] text-gray-400 mt-1.5 font-semibold">
                    <span>Geoff Advantage (Green)</span>
                    <span>Josh Advantage (Blue)</span>
                  </div>
                </div>

                {/* BET 2: SINGLE PLAYER ALPHA CROWN */}
                <div className="bg-gradient-to-br from-gray-800 to-gray-850 border border-gray-700 rounded-xl p-6 shadow-lg relative overflow-hidden">
                  <div className="absolute right-0 top-0 mt-2 mr-3 opacity-10 text-yellow-500">
                    <CrownIcon className="w-24 h-24" />
                  </div>

                  <div className="flex justify-between items-start mb-4">
                    <span className="bg-yellow-950 text-yellow-400 text-xs font-bold px-3 py-1 rounded-full border border-yellow-800">
                      BET 2: Alpha Crown ($10)
                    </span>
                    <span className="text-gray-400 text-xs font-semibold">Single Lowest Player</span>
                  </div>

                  <h3 className="text-lg font-bold text-gray-200 mb-1">Absolute Lowest Player Crown</h3>

                  <div className="flex items-center gap-5 mt-4">
                    <div className="bg-yellow-500/10 border-2 border-yellow-500/30 p-4 rounded-xl text-yellow-500 animate-pulse-slow">
                      <CrownIcon className="w-12 h-12" />
                    </div>

                    <div>
                      <div className="flex items-center gap-2">
                        <span className="text-2xl font-extrabold text-white">{alphaPlayer.name}</span>
                        <span className="text-xs bg-gray-700 text-gray-300 font-bold px-2 py-0.5 rounded">
                          {alphaPlayer.team === 'Geoff' ? "Geoff's Draft" : "Josh's Draft"}
                        </span>
                      </div>
                      
                      <div className="flex items-center gap-4 mt-1">
                        <div>
                          <p className="text-[10px] text-gray-400 uppercase tracking-wider">Score to Par</p>
                          <p className="text-3xl font-black text-green-400">
                            {alphaPlayer.score > 0 ? `+${alphaPlayer.score}` : alphaPlayer.score === 0 ? 'E' : alphaPlayer.score}
                          </p>
                        </div>
                        <div className="border-l border-gray-700 pl-4">
                          <p className="text-[10px] text-gray-400 uppercase tracking-wider">Thru Hole</p>
                          <p className="text-xl font-bold text-gray-200">{alphaPlayer.thru}</p>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-gray-850 border border-gray-750 p-2.5 rounded-lg mt-5 text-xs text-center font-medium text-gray-400">
                    👑 current holder: <span className="text-white font-extrabold">{alphaPlayer.team}</span> secures this $10 premium side-pot.
                  </div>
                </div>

              </div>

              {}
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                {/* GEOFF'S ROSTER */}
                <div className="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-xl">
                  <div className="bg-gradient-to-r from-golf-900 to-golf-800 px-6 py-4 border-b border-golf-700 flex justify-between items-center">
                    <div>
                      <h2 className="text-xl font-extrabold text-white flex items-center gap-2">
                        <span>🏌️‍♂️ Team Geoff</span>
                      </h2>
                      <p className="text-[11px] text-golf-200">Combined draft aggregate score</p>
                    </div>
                    <div className="bg-golf-950 text-golf-300 font-black px-4 py-2 rounded-lg border border-golf-700 text-lg">
                      {geoffTotal > 0 ? `+${geoffTotal}` : geoffTotal === 0 ? 'E' : geoffTotal}
                    </div>
                  </div>

                  <div className="divide-y divide-gray-750">
                    {geoffTeam.map((p) => (
                      <div 
                        key={p.id} 
                        className={`flex items-center justify-between px-6 py-4.5 transition-all duration-300 ${p.flash ? p.flash : 'hover:bg-gray-750'}`}
                      >
                        <div className="flex items-center gap-3">
                          <div className="h-9 w-9 bg-gray-700 rounded-full flex items-center justify-center font-extrabold text-sm text-golf-400">
                            {p.name.split(' ').map(n=>n[0]).join('')}
                          </div>
                          <div>
                            <div className="font-bold text-white flex items-center gap-2">
                              {p.name}
                              {alphaPlayer.name === p.name && (
                                <CrownIcon className="w-4 h-4 text-yellow-500" />
                              )}
                            </div>
                            <span className="text-xs text-gray-400 font-medium">Thru: <strong className="text-gray-200">{p.thru}</strong></span>
                          </div>
                        </div>

                        <div className="flex items-center gap-4">
                          {/* Manual control adjustments */}
                          <div className="flex items-center gap-1.5 bg-gray-750 px-2 py-1 rounded-md border border-gray-700">
                            <button 
                              onClick={() => handleScoreChange('Geoff', p.id, -1)}
                              className="text-xs text-green-400 hover:bg-gray-700 p-1.5 rounded font-bold transition-all"
                              title="Register Birdie (-1)"
                            >
                              ▼
                            </button>
                            <span className={`text-lg font-extrabold min-w-[28px] text-center ${p.score < 0 ? 'text-green-400' : p.score > 0 ? 'text-red-400' : 'text-gray-200'}`}>
                              {p.score > 0 ? `+${p.score}` : p.score === 0 ? 'E' : p.score}
                            </span>
                            <button 
                              onClick={() => handleScoreChange('Geoff', p.id, 1)}
                              className="text-xs text-red-400 hover:bg-gray-700 p-1.5 rounded font-bold transition-all"
                              title="Register Bogey (+1)"
                            >
                              ▲
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* JOSH'S ROSTER */}
                <div className="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-xl">
                  <div className="bg-gradient-to-r from-blue-900 to-blue-850 px-6 py-4 border-b border-blue-800 flex justify-between items-center">
                    <div>
                      <h2 className="text-xl font-extrabold text-white flex items-center gap-2">
                        <span>🏌️‍♂️ Team Josh</span>
                      </h2>
                      <p className="text-[11px] text-blue-200">Combined draft aggregate score</p>
                    </div>
                    <div className="bg-blue-950 text-blue-300 font-black px-4 py-2 rounded-lg border border-blue-800 text-lg">
                      {joshTotal > 0 ? `+${joshTotal}` : joshTotal === 0 ? 'E' : joshTotal}
                    </div>
                  </div>

                  <div className="divide-y divide-gray-750">
                    {joshTeam.map((p) => (
                      <div 
                        key={p.id} 
                        className={`flex items-center justify-between px-6 py-4.5 transition-all duration-300 ${p.flash ? p.flash : 'hover:bg-gray-750'}`}
                      >
                        <div className="flex items-center gap-3">
                          <div className="h-9 w-9 bg-gray-700 rounded-full flex items-center justify-center font-extrabold text-sm text-blue-400">
                            {p.name.split(' ').map(n=>n[0]).join('')}
                          </div>
                          <div>
                            <div className="font-bold text-white flex items-center gap-2">
                              {p.name}
                              {alphaPlayer.name === p.name && (
                                <CrownIcon className="w-4 h-4 text-yellow-500" />
                              )}
                            </div>
                            <span className="text-xs text-gray-400 font-medium">Thru: <strong className="text-gray-200">{p.thru}</strong></span>
                          </div>
                        </div>

                        <div className="flex items-center gap-4">
                          {/* Manual control adjustments */}
                          <div className="flex items-center gap-1.5 bg-gray-750 px-2 py-1 rounded-md border border-gray-700">
                            <button 
                              onClick={() => handleScoreChange('Josh', p.id, -1)}
                              className="text-xs text-green-400 hover:bg-gray-700 p-1.5 rounded font-bold transition-all"
                              title="Register Birdie (-1)"
                            >
                              ▼
                            </button>
                            <span className={`text-lg font-extrabold min-w-[28px] text-center ${p.score < 0 ? 'text-green-400' : p.score > 0 ? 'text-red-400' : 'text-gray-200'}`}>
                              {p.score > 0 ? `+${p.score}` : p.score === 0 ? 'E' : p.score}
                            </span>
                            <button 
                              onClick={() => handleScoreChange('Josh', p.id, 1)}
                              className="text-xs text-red-400 hover:bg-gray-700 p-1.5 rounded font-bold transition-all"
                              title="Register Bogey (+1)"
                            >
                              ▲
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            </>
          )}

          {}
          {isEditingScores && (
            <div className="bg-gray-800 border border-amber-600 rounded-xl p-6 shadow-2xl animate-fadeIn">
              <div className="flex justify-between items-center mb-6 pb-3 border-b border-gray-700">
                <div>
                  <h2 className="text-xl font-black text-amber-500 flex items-center gap-2">
                    <EditIcon className="w-5 h-5" />
                    Sync Correct Live Tournament Scores
                  </h2>
                  <p className="text-xs text-gray-400 mt-1">
                    Enter the exact scores to par (use negative numbers for under par, e.g. -3) and active thru-holes.
                  </p>
                </div>
                <button
                  onClick={() => setIsEditingScores(false)}
                  className="px-3 py-1.5 rounded text-xs bg-gray-700 text-gray-300 hover:bg-gray-650 font-bold"
                >
                  Cancel
                </button>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-6">
                
                {/* EDIT GEOFF'S LIST */}
                <div className="bg-gray-850 p-4.5 rounded-xl border border-gray-700">
                  <h3 className="text-sm font-extrabold uppercase text-golf-400 mb-4 tracking-wider">Geoff's Draft Lineup</h3>
                  <div className="space-y-3.5">
                    {editGeoff.map((p, index) => (
                      <div key={p.id} className="flex items-center gap-3 bg-gray-900 p-2 rounded-lg border border-gray-800">
                        <div className="font-bold text-sm text-gray-200 shrink-0 w-36">{p.name}</div>
                        
                        <div className="flex items-center gap-1.5 flex-1">
                          <span className="text-xs text-gray-500 uppercase tracking-wide font-semibold">Score:</span>
                          <input
                            type="number"
                            value={p.score}
                            onChange={(e) => {
                              const next = [...editGeoff];
                              next[index].score = parseInt(e.target.value) || 0;
                              setEditGeoff(next);
                            }}
                            className="w-16 bg-gray-800 border border-gray-700 text-center rounded px-2 py-1 text-sm text-white font-extrabold focus:outline-none focus:ring-1 focus:ring-golf-500"
                          />
                        </div>

                        <div className="flex items-center gap-1.5 flex-1">
                          <span className="text-xs text-gray-500 uppercase tracking-wide font-semibold">Thru:</span>
                          <input
                            type="text"
                            value={p.thru}
                            onChange={(e) => {
                              const next = [...editGeoff];
                              next[index].thru = e.target.value;
                              setEditGeoff(next);
                            }}
                            placeholder="E, F, 14"
                            className="w-16 bg-gray-800 border border-gray-700 text-center rounded px-2 py-1 text-sm text-white font-medium focus:outline-none focus:ring-1 focus:ring-golf-500"
                          />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* EDIT JOSH'S LIST */}
                <div className="bg-gray-850 p-4.5 rounded-xl border border-gray-700">
                  <h3 className="text-sm font-extrabold uppercase text-blue-400 mb-4 tracking-wider">Josh's Draft Lineup</h3>
                  <div className="space-y-3.5">
                    {editJosh.map((p, index) => (
                      <div key={p.id} className="flex items-center gap-3 bg-gray-900 p-2 rounded-lg border border-gray-800">
                        <div className="font-bold text-sm text-gray-200 shrink-0 w-36">{p.name}</div>
                        
                        <div className="flex items-center gap-1.5 flex-1">
                          <span className="text-xs text-gray-500 uppercase tracking-wide font-semibold">Score:</span>
                          <input
                            type="number"
                            value={p.score}
                            onChange={(e) => {
                              const next = [...editJosh];
                              next[index].score = parseInt(e.target.value) || 0;
                              setEditJosh(next);
                            }}
                            className="w-16 bg-gray-800 border border-gray-700 text-center rounded px-2 py-1 text-sm text-white font-extrabold focus:outline-none focus:ring-1 focus:ring-blue-500"
                          />
                        </div>

                        <div className="flex items-center gap-1.5 flex-1">
                          <span className="text-xs text-gray-500 uppercase tracking-wide font-semibold">Thru:</span>
                          <input
                            type="text"
                            value={p.thru}
                            onChange={(e) => {
                              const next = [...editJosh];
                              next[index].thru = e.target.value;
                              setEditJosh(next);
                            }}
                            placeholder="E, F, 14"
                            className="w-16 bg-gray-800 border border-gray-700 text-center rounded px-2 py-1 text-sm text-white font-medium focus:outline-none focus:ring-1 focus:ring-blue-500"
                          />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>

              <div className="flex justify-end gap-3.5 pt-4 border-t border-gray-750">
                <button
                  onClick={() => {
                    const cleanGeoff = editGeoff.map(p => ({ ...p, score: 0, thru: "E" }));
                    const cleanJosh = editJosh.map(p => ({ ...p, score: 0, thru: "E" }));
                    setEditGeoff(cleanGeoff);
                    setEditJosh(cleanJosh);
                  }}
                  className="px-4 py-2.5 rounded text-xs text-gray-400 hover:text-white transition"
                >
                  Reset All to Even (E)
                </button>
                <button
                  onClick={saveBulkScores}
                  className="px-6 py-2.5 rounded-lg bg-amber-600 hover:bg-amber-700 text-white font-bold text-sm shadow-md transition-colors"
                >
                  Apply & Calculate Side-Bets
                </button>
              </div>
            </div>
          )}

          {}
          {activeTab === 'logs' && !isEditingScores && (
            <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
              <div className="flex justify-between items-center mb-4 border-b border-gray-700 pb-3">
                <h2 className="text-lg font-bold text-white flex items-center gap-2">
                  <LogsIcon className="w-5 h-5 text-golf-400" />
                  Live Event Polling Feed
                </h2>
                <button
                  onClick={() => setLogs([])}
                  className="text-xs text-gray-400 hover:text-white px-2.5 py-1 rounded bg-gray-700 transition"
                >
                  Clear Feed Logs
                </button>
              </div>

              <div className="bg-gray-950 rounded-lg p-4 font-mono text-sm h-96 overflow-y-auto space-y-2 border border-gray-900">
                {logs.length === 0 ? (
                  <p className="text-gray-500 text-center py-20">No live tracking events recorded yet. Adjust some player scores or start live simulator mode!</p>
                ) : (
                  logs.map((log, i) => (
                    <div key={i} className="flex gap-4 border-b border-gray-900 pb-1">
                      <span className="text-golf-400 shrink-0 font-semibold">{log.time}</span>
                      <span className="text-gray-300">{log.text}</span>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

          {}
          {activeTab === 'api_config' && !isEditingScores && (
            <div className="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl max-w-2xl mx-auto">
              <h2 className="text-xl font-bold text-white mb-2 flex items-center gap-2">
                <SettingsIcon className="w-5 h-5 text-golf-400" />
                Live API & Configuration Setup
              </h2>
              <p className="text-gray-400 text-sm mb-6">
                Configure your RapidAPI key and map endpoints to query real-time data dynamically.
              </p>

              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-300 uppercase tracking-wider mb-2">
                    RapidAPI Key (Slash Golf endpoint)
                  </label>
                  <input
                    type="password"
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                    placeholder="Enter RapidAPI slash-golf key..."
                    className="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-golf-500"
                  />
                  <span className="text-[11px] text-gray-500 block mt-1">
                    Your key is parsed securely only within the browser context to query real-time leaderboard statistics.
                  </span>
                </div>

                <div className="bg-gray-900 border border-gray-700 p-4 rounded-lg space-y-2">
                  <h4 className="text-xs font-extrabold text-white uppercase tracking-wide">Polling Configuration Defaults:</h4>
                  <ul className="text-xs text-gray-400 space-y-1.5 list-disc list-inside">
                    <li>Query Endpoint: <code className="text-golf-400">https://live-golf-data.p.rapidapi.com/leaderboard</code></li>
                    <li>Automatic polling interval: <span className="text-white">5 Minutes</span></li>
                    <li>Saves & outputs log updates for leadership/margin changes</li>
                  </ul>
                </div>

                <div className="pt-4 border-t border-gray-700 flex justify-end gap-3">
                  <button
                    onClick={() => {
                      const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                      setLogs(prev => [{ time: timestamp, text: "💾 Local key configuration updated." }, ...prev]);
                      setActiveTab('dashboard');
                    }}
                    className="px-5 py-2.5 rounded-lg bg-golf-600 hover:bg-golf-700 font-semibold text-sm transition-colors text-white"
                  >
                    Save & Return to Board
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Betting Pools Terms info box footer */}
          <footer className="mt-12 text-center text-xs text-gray-500 border-t border-gray-850 pt-6">
            <p>🏌️‍♂️ Geoff vs. Josh — US Open Head-to-Head Friendly Side-Betting Pool Dashboard.</p>
            <p className="mt-1">Bet 1: lowest aggregate roster score ($10). Bet 2: single player lowest total crown ($10).</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
