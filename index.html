<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Open Side-Bet Tracker</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM Production CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone for compilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js" crossorigin></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            golf: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
              950: '#052e16',
            },
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'flash-green': 'flashGreen 1.5s ease-out',
            'flash-red': 'flashRed 1.5s ease-out',
          },
          keyframes: {
            flashGreen: {
              '0%': { backgroundColor: 'rgba(34, 197, 94, 0.3)' },
              '100%': { backgroundColor: 'transparent' },
            },
            flashRed: {
              '0%': { backgroundColor: 'rgba(239, 68, 68, 0.3)' },
              '100%': { backgroundColor: 'transparent' },
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    const CrownIcon = ({ className = "w-6 h-6" }) => (
      <svg className={className} fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 22h20v-2H2v2zm1-3l2-12 5 4 4-8 4 8 5-4 2 12H3z"/>
      </svg>
    );

    const FlagIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M3 21v-18m0 0h10.5c.6 0 1.2.3 1.5.8l1.4 2.4c.3.5.9.8 1.5.8H21v9h-8.1c-.6 0-1.2-.3-1.5-.8l-1.4-2.4c-.3-.5-.9-.8-1.5-.8H3z" />
      </svg>
    );

    const SettingsIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const LogsIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );

    const EditIcon = ({ className = "w-4 h-4" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    );

    function App() {
      // Your Team (Josh) - Preloaded with Live Round 2 values as of June 19, 2026
      const [joshTeam, setJoshTeam] = useState([
        { id: 'jo1', name: "Rory McIlroy", score: -1, thru: "F", today: -1, flash: "" },
        { id: 'jo2', name: "Xander Schauffele", score: -2, thru: "12", today: -3, flash: "" },
        { id: 'jo3', name: "Matt Fitzpatrick", score: -1, thru: "13", today: 2, flash: "" },
        { id: 'jo4', name: "Tommy Fleetwood", score: 0, thru: "F", today: 0, flash: "" },
        { id: 'jo5', name: "Russell Henley", score: 2, thru: "13", today: 2, flash: "" }
      ]);

      // Geoff's Team - Preloaded with Live Round 2 values as of June 19, 2026
      const [geoffTeam, setGeoffTeam] = useState([
        { id: 'g1', name: "Scottie Scheffler", score: 2, thru: "F", today: 0, flash: "" },
        { id: 'g2', name: "Jon Rahm", score: 0, thru: "10", today: 2, flash: "" },
        { id: 'g3', name: "Cameron Young", score: 2, thru: "F", today: 0, flash: "" },
        { id: 'g4', name: "Tyrrell Hatton", score: 4, thru: "F", today: 0, flash: "" },
        { id: 'g5', name: "Wyndham Clark", score: -7, thru: "13", today: -1, flash: "" }
      ]);

      // Robust fuzzy player name matching (supports "Cam" vs "Cameron" and "Matt" vs "Matthew")
      const isNameMatch = (apiFirst, apiLast, targetFull) => {
        const targetClean = targetFull.toLowerCase().replace(/[^a-z]/g, '');
        const apiFirstClean = apiFirst.toLowerCase().replace(/[^a-z]/g, '');
        const apiLastClean = apiLast.toLowerCase().replace(/[^a-z]/g, '');
        const apiFullClean = apiFirstClean + apiLastClean;

        if (apiFullClean === targetClean) return true;

        const targetParts = targetFull.toLowerCase().split(/\s+/);
        if (targetParts.length >= 2) {
          const targetFirst = targetParts[0].replace(/[^a-z]/g, '');
          const targetLast = targetParts[targetParts.length - 1].replace(/[^a-z]/g, '');

          if (apiLastClean === targetLast) {
            // Check prefix (e.g., Cam / Cameron, Matt / Matthew)
            if (apiFirstClean.startsWith(targetFirst) || targetFirst.startsWith(apiFirstClean)) {
              if (Math.min(apiFirstClean.length, targetFirst.length) >= 3) {
                return true;
              }
            }
            // Handle matching initials
            if (apiFirstClean[0] === targetFirst[0]) {
              return true;
            }
          }
        }
        return false;
      };

      // Helper to dynamically clean up active golf status strings
      const formatThru = (thru) => {
        if (!thru) return "Not Started";
        const clean = String(thru).trim().toLowerCase();
        
        // Match standard tee times containing colon separators or time markers
        if (clean.includes(':') || clean.includes('am') || clean.includes('pm')) {
          return `Tee Time: ${thru}`;
        }
        if (clean === 'f' || clean === 'final' || clean === 'finished') {
          return 'Finished';
        }
        if (clean === 'e' || clean === 'even' || clean === 'ns' || clean === 'not started') {
          return 'Not Started';
        }
        // If it's a raw hole number, label it as thru
        if (!isNaN(clean)) {
          return `Thru ${thru}`;
        }
        return thru;
      };

      // Persistent LocalStorage hook preloaded with your RapidAPI Key
      const [apiKey, setApiKey] = useState(() => {
        return localStorage.getItem('us_open_tracker_api_key') || "f901bd0845msh683e67aacee3761p1e31b4jsn583747c948bc";
      });

      const [tournId, setTournId] = useState("026"); // PGA Tour US Open ID
      const [year, setYear] = useState("2026");
      const [roundId, setRoundId] = useState("0"); // 0 for most recent/auto
      const [isSimulating, setIsSimulating] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard'); // dashboard | api_config | logs
      const [isEditingScores, setIsEditingScores] = useState(false);
      const [lastSyncTime, setLastSyncTime] = useState("Never");
      const [apiStatus, setApiStatus] = useState("idle"); // idle | active | success | error
      const [rawPayload, setRawPayload] = useState(null); // Collapsible raw json debugger
      
      // Custom dialog modal fallback to replace browser alerts
      const [modalMessage, setModalMessage] = useState(null);

      // Temporary staging states for bulk edits
      const [editGeoff, setEditGeoff] = useState([]);
      const [editJosh, setEditJosh] = useState([]);

      const [logs, setLogs] = useState([
        { time: "11:45 AM", text: "🏆 Team rosters assigned correctly: Josh (Rory, Xander, Matt, Tommy, Russell) vs. Geoff (Scottie, Jon, Cameron, Tyrrell, Wyndham)." },
        { time: "11:46 AM", text: "💡 Live API integration loaded with your coded RapidAPI Key!" }
      ]);

      // Sync API Key to Local Storage securely
      useEffect(() => {
        localStorage.setItem('us_open_tracker_api_key', apiKey);
      }, [apiKey]);

      // Statistics & side-bet calculations
      const joshTotal = joshTeam.reduce((sum, p) => sum + p.score, 0);
      const geoffTotal = geoffTeam.reduce((sum, p) => sum + p.score, 0);

      // Determine Bet 1 Leadership
      let bet1Leader = "TIED";
      let bet1Margin = 0;
      if (joshTotal < geoffTotal) {
        bet1Leader = "Josh";
        bet1Margin = geoffTotal - joshTotal;
      } else if (geoffTotal < joshTotal) {
        bet1Leader = "Geoff";
        bet1Margin = joshTotal - geoffTotal;
      }

      // Determine Bet 2 Alpha (Lowest single player)
      const allPlayers = [
        ...joshTeam.map(p => ({ ...p, team: 'Josh (You)' })),
        ...geoffTeam.map(p => ({ ...p, team: 'Geoff' }))
      ];
      
      const alphaPlayer = allPlayers.reduce((best, current) => {
        return current.score < best.score ? current : best;
      }, allPlayers[0]);

      // Open Bulk Edit staging state
      const openBulkEdit = () => {
        setEditGeoff(geoffTeam.map(p => ({ ...p })));
        setEditJosh(joshTeam.map(p => ({ ...p })));
        setIsEditingScores(true);
      };

      // Save Bulk Score updates
      const saveBulkScores = () => {
        setGeoffTeam(editGeoff);
        setJoshTeam(editJosh);
        setIsEditingScores(false);
        setLastSyncTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
        
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        setLogs(prev => [
          { time: timestamp, text: "📝 Live scores updated manually." },
          ...prev
        ]);
      };

      // Manual individual modifier logic
      const handleScoreChange = (team, id, delta) => {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const updateTeam = (prevList) =>
          prevList.map(p => {
            if (p.id === id) {
              const newScore = p.score + delta;
              const flashType = delta < 0 ? 'flash-green' : 'flash-red';
              const logMsg = `⚡️ ${p.name} (${team}) adjusted to ${newScore > 0 ? '+' : ''}${newScore === 0 ? 'E' : newScore}.`;
              
              setLogs(prev => [{ time: timestamp, text: logMsg }, ...prev]);
              return { ...p, score: newScore, flash: flashType };
            }
            return p;
          });

        if (team === 'Josh') {
          setJoshTeam(updateTeam);
        } else {
          setGeoffTeam(updateTeam);
        }

        // Reset flashing animation states
        setTimeout(() => {
          setJoshTeam(prev => prev.map(p => p.id === id ? { ...p, flash: '' } : p));
          setGeoffTeam(prev => prev.map(p => p.id === id ? { ...p, flash: '' } : p));
        }, 1500);
      };

      // Real live fetch routine querying Slash Golf Live Leaderboard
      const fetchLiveLeaderboard = async () => {
        if (!apiKey) {
          setModalMessage({
            title: "RapidAPI Key Needed",
            body: "To pull live leaderboard data from the courses, please enter your RapidAPI Key in the 'API Setup' tab."
          });
          return;
        }

        setIsLoading(true);
        setApiStatus("active");
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        setLogs(prev => [{ time: timestamp, text: `🔄 Fetching live standings from Slash Golf API (Tourn: ${tournId}, Year: ${year}, RoundOverride: ${roundId === "0" ? "Auto" : roundId})...` }, ...prev]);

        try {
          // Construct live query url supporting optional Round Override
          let targetUrl = `https://live-golf-data.p.rapidapi.com/leaderboard?orgId=1&tournId=${tournId}&year=${year}`;
          if (roundId !== "0") {
            targetUrl += `&roundId=${roundId}`;
          }

          const response = await fetch(targetUrl, {
            method: 'GET',
            headers: {
              'x-rapidapi-key': apiKey,
              'x-rapidapi-host': 'live-golf-data.p.rapidapi.com'
            }
          });

          if (!response.ok) {
            throw new Error(`RapidAPI request failed: ${response.statusText}`);
          }

          const data = await response.json();
          setRawPayload(data); // Store for Raw JSON inspector debugging

          const rows = data.leaderboardRows || data.leaderboard || [];

          if (rows.length === 0) {
            throw new Error("No player rows returned in leaderboard payload. Is this tournament running currently? Double check the Tournament ID in API Setup.");
          }

          // Parse and match incoming data
          const apiLogs = [];
          
          const updateTeamRoster = (currentRoster) => {
            return currentRoster.map(p => {
              // Fuzzy name lookup matching Nicknames and prefixes
              const matchedRow = rows.find(row => 
                isNameMatch(row.firstName || '', row.lastName || '', p.name)
              );

              if (matchedRow) {
                // Determine Score (interpreting "E", "EVEN", and standard string formats)
                let scoreVal = 0;
                const totalStr = String(matchedRow.total).trim();
                if (totalStr === "E" || totalStr.toLowerCase() === "even" || totalStr === "0" || totalStr.toLowerCase() === "even par") {
                  scoreVal = 0;
                } else {
                  const parsed = parseInt(totalStr.replace('+', ''));
                  scoreVal = isNaN(parsed) ? p.score : parsed;
                }

                // Determine Thru Hole dynamically
                let thruVal = p.thru;
                if (matchedRow.roundComplete || matchedRow.status === "finished") {
                  thruVal = "F";
                } else {
                  // Fallbacks for various API schema keys
                  const hole = matchedRow.thru !== undefined ? matchedRow.thru : 
                               matchedRow.thruHole !== undefined ? matchedRow.thruHole :
                               matchedRow.currentHole !== undefined ? matchedRow.currentHole : 
                               matchedRow.lastHole;
                  
                  if (hole !== undefined && hole !== null && hole !== "" && String(hole) !== "0") {
                    thruVal = String(hole);
                  } else if (matchedRow.teeTime) {
                    thruVal = matchedRow.teeTime;
                  } else {
                    thruVal = "E";
                  }
                }

                const change = scoreVal - p.score;
                let flashClass = "";
                if (change < 0) flashClass = "flash-green";
                else if (change > 0) flashClass = "flash-red";

                apiLogs.push(`✅ API Synced ${p.name}: ${scoreVal > 0 ? '+' : ''}${scoreVal === 0 ? 'E' : scoreVal} (${formatThru(thruVal)})`);

                return {
                  ...p,
                  score: scoreVal,
                  thru: thruVal,
                  flash: flashClass
                };
              } else {
                apiLogs.push(`⚠️ No live tournament match found for ${p.name}`);
                return p;
              }
            });
          };

          setJoshTeam(prev => updateTeamRoster(prev));
          setGeoffTeam(prev => updateTeamRoster(prev));
          setLastSyncTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
          setApiStatus("success");

          setLogs(prev => [
            { time: timestamp, text: "🟢 Live leaderboard successfully queried and recalculated!" },
            ...apiLogs.map(l => ({ time: timestamp, text: l })),
            ...prev
          ]);

          // Clear flashy animation styles
          setTimeout(() => {
            setJoshTeam(prev => prev.map(p => ({ ...p, flash: "" })));
            setGeoffTeam(prev => prev.map(p => ({ ...p, flash: "" })));
          }, 1500);

        } catch (err) {
          setApiStatus("error");
          setLogs(prev => [{ time: timestamp, text: `❌ Live Fetch Error: ${err.message}` }, ...prev]);
          setModalMessage({
            title: "Failed to Query Live Standings",
            body: `The API request returned an error: ${err.message}. If the scores are not up to date, try entering the exact Round number (like Round 2) instead of 'Auto' in the API Setup tab.`
          });
        } finally {
          setIsLoading(false);
        }
      };

      // Auto-polling on mount if key is available
      useEffect(() => {
        if (apiKey) {
          fetchLiveLeaderboard();
        }
      }, []);

      // Auto-detect U.S. Open ID from Slash Golf Schedule
      const autoDiscoverTournId = async () => {
        if (!apiKey) {
          setModalMessage({
            title: "RapidAPI Key Needed",
            body: "Please enter your RapidAPI Key first to browse the tournament schedule."
          });
          return;
        }

        setIsLoading(true);
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        setLogs(prev => [{ time: timestamp, text: "🔍 Auto-discovering U.S. Open tournament ID from 2026 PGA schedule..." }, ...prev]);

        try {
          const response = await fetch(`https://live-golf-data.p.rapidapi.com/schedule?orgId=1&year=${year}`, {
            method: 'GET',
            headers: {
              'x-rapidapi-key': apiKey,
              'x-rapidapi-host': 'live-golf-data.p.rapidapi.com'
            }
          });

          if (!response.ok) {
            throw new Error(`Schedule fetch failed: ${response.statusText}`);
          }

          const data = await response.json();
          const scheduleList = data.schedule || [];
          
          const usOpenObj = scheduleList.find(t => 
            t.name && (t.name.toLowerCase().includes("u.s. open") || t.name.toLowerCase().includes("us open"))
          );

          if (usOpenObj) {
            setTournId(usOpenObj.tournId);
            setLogs(prev => [{ time: timestamp, text: `✅ Auto-discovered U.S. Open ID: "${usOpenObj.tournId}" (${usOpenObj.name}).` }, ...prev]);
            setModalMessage({
              title: "Tournament ID Detected!",
              body: `The schedule lookup found the "${usOpenObj.name}". The ID has been updated to "${usOpenObj.tournId}".`
            });
          } else {
            throw new Error("Could not find any tournament matching 'US Open' in the schedule.");
          }
        } catch (err) {
          setLogs(prev => [{ time: timestamp, text: `⚠️ Discovery failed: ${err.message}. Falling back to default ID '026'.` }, ...prev]);
          setModalMessage({
            title: "Discovery Failed",
            body: `We couldn't parse the live schedule: ${err.message}. We kept the default U.S. Open ID '026'.`
          });
        } finally {
          setIsLoading(false);
        }
      };

      // Simulator loop
      useEffect(() => {
        let interval;
        if (isSimulating) {
          interval = setInterval(() => {
            const allT = ['Josh', 'Geoff'];
            const randomTeam = allT[Math.floor(Math.random() * allT.length)];
            const targetList = randomTeam === 'Josh' ? joshTeam : geoffTeam;
            const randomPlayer = targetList[Math.floor(Math.random() * targetList.length)];
            
            const actionSeed = Math.random();
            if (actionSeed < 0.45) {
              handleScoreChange(randomTeam, randomPlayer.id, -1);
            } else if (actionSeed < 0.8) {
              handleScoreChange(randomTeam, randomPlayer.id, 1);
            } else {
              const nextThru = randomPlayer.thru === 'F' ? '1' : randomPlayer.thru === 'E' || randomPlayer.thru === '18' ? '1' : String(parseInt(randomPlayer.thru) + 1);
              if (nextThru !== 'NaN') {
                const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                setLogs(prev => [{ time: timestamp, text: `🏌️‍♂️ ${randomPlayer.name} has moved to hole ${nextThru}.` }, ...prev]);
                
                const updateThru = (list) => list.map(p => p.id === randomPlayer.id ? { ...p, thru: nextThru } : p);
                if (randomTeam === 'Josh') {
                  setJoshTeam(updateThru);
                } else {
                  setGeoffTeam(updateThru);
                }
              }
            }
          }, 8000);
        }
        return () => clearInterval(interval);
      }, [isSimulating, joshTeam, geoffTeam]);

      return (
        <div className="max-w-7xl mx-auto px-4 py-6 md:py-10">
          
          {/* Custom Notification Modal dialog wrapper */}
          {modalMessage && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
              <div className="bg-gray-800 border border-gray-700 max-w-md w-full rounded-xl p-6 shadow-2xl relative">
                <h3 className="text-xl font-bold text-amber-500 mb-2">{modalMessage.title}</h3>
                <p className="text-gray-300 text-sm mb-6 leading-relaxed">{modalMessage.body}</p>
                <div className="flex justify-end">
                  <button
                    onClick={() => setModalMessage(null)}
                    className="px-5 py-2.5 bg-golf-600 hover:bg-golf-700 text-white text-sm font-semibold rounded-lg shadow-md transition"
                  >
                    Got It
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Header Dashboard Banner */}
          <header className="flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-800 border-l-4 border-golf-600 rounded-lg p-6 mb-8 shadow-xl">
            <div>
              <div className="flex items-center space-x-2 text-golf-400 text-xs font-semibold uppercase tracking-wider mb-1">
                <FlagIcon className="w-4 h-4 text-golf-500" />
                <span>Live Friendly Major Championship Wager</span>
              </div>
              <h1 className="text-3xl font-extrabold tracking-tight text-white flex items-center gap-2">
                U.S. Open H2H Pool Tracker
              </h1>
              <p className="text-gray-400 text-sm mt-1">
                Real-time side-bet engine monitoring Josh (You) vs. Geoff
              </p>
            </div>

            <div className="flex flex-wrap gap-2 mt-4 md:mt-0">
              <button
                onClick={() => { setActiveTab('dashboard'); setIsEditingScores(false); }}
                className={`px-4 py-2 rounded-md font-medium text-sm transition-all duration-150 flex items-center gap-2 ${activeTab === 'dashboard' && !isEditingScores ? 'bg-golf-600 text-white shadow-md' : 'bg-gray-750 hover:bg-gray-700 text-gray-300'}`}
              >
                📊 Dashboard
              </button>
              <button
                onClick={() => { setActiveTab('logs'); setIsEditingScores(false); }}
                className={`px-4 py-2 rounded-md font-medium text-sm transition-all duration-150 flex items-center gap-2 ${activeTab === 'logs' ? 'bg-golf-600 text-white shadow-md' : 'bg-gray-750 hover:bg-gray-700 text-gray-300'}`}
              >
                <LogsIcon className="w-4 h-4" />
                Live Console ({logs.length})
              </button>
              <button
                onClick={() => { setActiveTab('api_config'); setIsEditingScores(false); }}
                className={`px-4 py-2 rounded-md font-medium text-sm transition-all duration-150 flex items-center gap-2 ${activeTab === 'api_config' ? 'bg-golf-600 text-white shadow-md' : 'bg-gray-750 hover:bg-gray-700 text-gray-300'}`}
              >
                <SettingsIcon className="w-4 h-4" />
                API Setup

                <SettingsIcon className="w-5 h-5 text-golf-400" />
                Live API & Configuration Setup
              </h2>
              <p className="text-gray-400 text-sm mb-6">
                Configure your RapidAPI key and map endpoints to query real-time data dynamically.
              </p>

              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-300 uppercase tracking-wider mb-2">
                    RapidAPI Key (Slash Golf endpoint)
                  </label>
                  <input
                    type="password"
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                    placeholder="Enter RapidAPI slash-golf key..."
                    className="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-golf-500"
                  />
                  <span className="text-[11px] text-gray-500 block mt-1">
                    🔒 Stored safely in your local browser storage context to directly query real-time leaderboard statistics.
                  </span>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-gray-300 uppercase tracking-wider mb-2">
                      Tournament ID (tournId)
                    </label>
                    <div className="flex gap-2">
                      <input
                        type="text"
                        value={tournId}
                        onChange={(e) => setTournId(e.target.value)}
                        className="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-golf-500"
                      />
                      <button
                        onClick={autoDiscoverTournId}
                        className="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-lg text-xs font-bold transition shrink-0"
                        title="Auto-detect US Open ID from schedule"
                      >
                        Auto-Detect 🔍
                      </button>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-300 uppercase tracking-wider mb-2">
                      Year
                    </label>
                    <input
                      type="text"
                      value={year}
                      onChange={(e) => setYear(e.target.value)}
                      className="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-golf-500"
                    />
                  </div>
                </div>

                {/* ACTIVE ROUND ID CONFIG (Resolves API lag on the course) */}
                <div>
                  <label className="block text-xs font-bold text-gray-300 uppercase tracking-wider mb-2">
                    Specific Round Override
                  </label>
                  <select
                    value={roundId}
                    onChange={(e) => setRoundId(e.target.value)}
                    className="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-golf-500"
                  >
                    <option value="0">Auto-Detect (Most Recent Leaderboard)</option>
                    <option value="1">Round 1</option>
                    <option value="2">Round 2</option>
                    <option value="3">Round 3</option>
                    <option value="4">Round 4</option>
                  </select>
                  <span className="text-[11px] text-amber-500 block mt-1">
                    ⚠️ If the API is displaying Round 1 tee times or outdated scores, change this from "Auto-Detect" to "Round 2" to force the live feed.
                  </span>
                </div>

                <div className="bg-gray-900 border border-gray-700 p-4 rounded-lg space-y-2">
                  <h4 className="text-xs font-extrabold text-white uppercase tracking-wide">Polling Configuration:</h4>
                  <ul className="text-xs text-gray-400 space-y-1.5 list-disc list-inside">
                    <li>Query Endpoint: <code className="text-golf-400">https://live-golf-data.p.rapidapi.com/leaderboard</code></li>
                    <li>Saves & outputs log updates for leadership/margin changes</li>
                  </ul>
                </div>

                <div className="pt-4 border-t border-gray-750 flex justify-end gap-3">
                  <button
                    onClick={() => {
                      const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                      setLogs(prev => [{ time: timestamp, text: "💾 Local key configuration updated and saved." }, ...prev]);
                      setActiveTab('dashboard');
                    }}
                    className="px-5 py-2.5 rounded-lg bg-golf-600 hover:bg-golf-700 font-semibold text-sm transition-colors text-white"
                  >
                    Save & Return to Board
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Betting Pools Terms info box footer */}
          <footer className="mt-12 text-center text-xs text-gray-500 border-t border-gray-850 pt-6">
            <p>🏌️‍♂️ Josh (You) vs. Geoff — US Open Head-to-Head Friendly Side-Betting Pool Dashboard.</p>
            <p className="mt-1">Bet 1: lowest aggregate roster score ($10). Bet 2: single player lowest total crown ($10).</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
